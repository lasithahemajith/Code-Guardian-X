global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: "metrics-service"
    static_configs:
      - targets: ["metrics-service:8007"]
    metrics_path: /metrics

  - job_name: "repo-service"
    static_configs:
      - targets: ["repo-service:8001"]
    metrics_path: /health

  - job_name: "analysis-service"
    static_configs:
      - targets: ["analysis-service:8002"]
    metrics_path: /health

  - job_name: "ai-service"
    static_configs:
      - targets: ["ai-service:8003"]
    metrics_path: /health

  - job_name: "static-analysis"
    static_configs:
      - targets: ["static-analysis:8004"]
    metrics_path: /health

  - job_name: "review-aggregator"
    static_configs:
      - targets: ["review-aggregator:8005"]
    metrics_path: /health

  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:8006"]
    metrics_path: /health
