---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: codeguardian
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: codeguardian
            - name: POSTGRES_USER
              value: codeguardian
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: codeguardian-secrets
                  key: postgres-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "codeguardian"]
            initialDelaySeconds: 10
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: codeguardian
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
  clusterIP: None
