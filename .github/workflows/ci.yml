name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - repo-service
          - analysis-service
          - ai-service
          - static-analysis
          - review-aggregator
          - notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          pytest tests/ -v --tb=short

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 services/ --max-line-length=120 --exclude=__pycache__,*.pyc --per-file-ignores="*/tests/*.py:E402"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Run tests
        run: cd frontend && npm test -- --passWithNoTests

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-backend, test-frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images (dry-run, no push)
        env:
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
        run: |
          docker compose build --no-cache 2>&1 | tail -20
